<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <title>MindAR Image Tracking</title>

    <!-- MindAR 1.2.5 officially documents A-Frame 1.5.0 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;

        /*
         * Important:
         * Do not use an opaque background here.
         * The camera video is displayed behind the A-Frame canvas.
         */
        background: transparent;
      }

      /* Custom scanning overlay */
      #scanning-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;

        display: flex;
        align-items: center;
        justify-content: center;

        pointer-events: none;
      }

      #scanning-overlay.hidden {
        display: none;
      }

      .scan-frame {
        position: relative;

        /*
         * Large rectangular scanning guide.
         * The ratio matches a width-1, height-0.552 target.
         */
        width: min(90vw, 78vh);
        aspect-ratio: 1 / 0.552;

        box-sizing: border-box;
        border: 4px solid white;
        border-radius: 18px;

        box-shadow:
          0 0 0 9999px rgba(0, 0, 0, 0.3),
          0 0 20px rgba(255, 255, 255, 0.8);
      }

      .scan-line {
        position: absolute;
        top: 10%;
        left: 5%;

        width: 90%;
        height: 3px;

        background: white;
        box-shadow: 0 0 10px white;

        animation: scan 2s ease-in-out infinite alternate;
      }

      @keyframes scan {
        from {
          top: 10%;
        }

        to {
          top: 90%;
        }
      }

      .scan-message {
        position: absolute;
        left: 50%;
        bottom: 7vh;

        transform: translateX(-50%);

        width: max-content;
        max-width: 85vw;
        box-sizing: border-box;

        padding: 10px 16px;

        color: white;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 8px;

        font-family: Arial, sans-serif;
        font-size: 16px;
        text-align: center;
      }

      /* Error message shown if camera startup fails */
      #error-message {
        position: fixed;
        inset: 0;
        z-index: 2000;

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 24px;
        box-sizing: border-box;

        color: white;
        background: rgba(0, 0, 0, 0.9);

        font-family: Arial, sans-serif;
        font-size: 17px;
        line-height: 1.5;
        text-align: center;
      }

      #error-message.hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay" class="hidden">
      <div class="scan-frame">
        <div class="scan-line"></div>
      </div>

      <div class="scan-message">
        Point the camera at the target image
      </div>
    </div>

    <div id="error-message" class="hidden">
      The camera could not be started. Check that camera permission is allowed
      and that this page is running through HTTPS or localhost.
    </div>

    <a-scene
      mindar-image="
        imageTargetSrc: https://raw.githubusercontent.com/yonhonng/junk_code/main/targets.mind;
        uiScanning: #scanning-overlay;
        autoStart: true;

        filterMinCF: 0.05;
        filterBeta: 5000;

        warmupTolerance: 1;
        missTolerance: 3;
      "
      color-space="sRGB"
      renderer="
        colorManagement: true;
        physicallyCorrectLights: true;
      "
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img
          id="card"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/logo_final.png"
        />

        <a-asset-item
          id="avatarModel"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/model.glb"
        ></a-asset-item>
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
      ></a-camera>

      <a-entity
        id="image-target"
        mindar-image-target="targetIndex: 0"
      >
        <a-plane
          src="#card"
          position="0 0 0"
          rotation="0 0 0"
          width="1"
          height="0.313"
          material="
            shader: flat;
            transparent: true;
            opacity: 1;
            alphaTest: 0.01;
            depthWrite: false;
            side: double;
          "
        ></a-plane>

        <a-gltf-model
          src="#avatarModel"
          position="0 0 0.1"
          rotation="0 0 0"
          scale="0.005 0.005 0.005"
          "
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const scene = document.querySelector("a-scene");
        const target = document.querySelector("#image-target");
        const errorMessage = document.querySelector("#error-message");

        scene.addEventListener("arReady", () => {
          console.log("MindAR is ready.");
          errorMessage.classList.add("hidden");
        });

        scene.addEventListener("arError", (event) => {
          console.error("MindAR failed to start:", event);
          errorMessage.classList.remove("hidden");
        });

        target.addEventListener("targetFound", () => {
          console.log("Target found.");
        });

        target.addEventListener("targetLost", () => {
          console.log("Target lost.");
        });
      });
    </script>
  </body>
</html>
