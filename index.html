<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <title>MindAR Image Tracking</title>

    <!-- MindAR 1.2.5 officially documents A-Frame 1.5.0 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;

        /*
         * Do not use an opaque background here.
         * The camera video is displayed behind the A-Frame canvas.
         */
        background: transparent;
      }

      /* Custom scanning overlay */
      #scanning-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;

        display: flex;
        align-items: center;
        justify-content: center;

        pointer-events: none;
      }

      #scanning-overlay.hidden {
        display: none;
      }

      .scan-frame {
        position: relative;

        /*
         * Large rectangular scanning guide.
         * The ratio matches a width-1, height-0.552 target.
         */
        width: min(90vw, 78vh);
        aspect-ratio: 1 / 0.552;

        box-sizing: border-box;
        border: 4px solid white;
        border-radius: 18px;

        box-shadow:
          0 0 0 9999px rgba(0, 0, 0, 0.3),
          0 0 20px rgba(255, 255, 255, 0.8);
      }

      .scan-line {
        position: absolute;
        top: 10%;
        left: 5%;

        width: 90%;
        height: 3px;

        background: white;
        box-shadow: 0 0 10px white;

        animation: scan 2s ease-in-out infinite alternate;
      }

      @keyframes scan {
        from {
          top: 10%;
        }

        to {
          top: 90%;
        }
      }

      .scan-message {
        position: absolute;
        left: 50%;
        bottom: 7vh;

        transform: translateX(-50%);

        width: max-content;
        max-width: 85vw;
        box-sizing: border-box;

        padding: 10px 16px;

        color: white;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 8px;

        font-family: Arial, sans-serif;
        font-size: 16px;
        text-align: center;
      }

      /* Error message shown if camera startup fails */
      #error-message {
        position: fixed;
        inset: 0;
        z-index: 2000;

        display: flex;
        align-items: center;
        justify-content: center;

        padding: 24px;
        box-sizing: border-box;

        color: white;
        background: rgba(0, 0, 0, 0.9);

        font-family: Arial, sans-serif;
        font-size: 17px;
        line-height: 1.5;
        text-align: center;
      }

      #error-message.hidden {
        display: none;
      }

      /* Top-left Aquaponics koi visibility toggle */
      #aquaponics-toggle {
        position: fixed;
        top: max(16px, env(safe-area-inset-top));
        left: max(16px, env(safe-area-inset-left));
        z-index: 1500;

        display: inline-flex;
        align-items: center;
        gap: 10px;

        min-height: 46px;
        padding: 10px 16px 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 999px;

        color: white;
        background: linear-gradient(135deg, rgba(20, 153, 124, 0.94), rgba(0, 102, 153, 0.94));
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);

        font-family: Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.2px;

        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease,
          opacity 160ms ease;
      }

      #aquaponics-toggle::before {
        content: "";
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
        border: 2px solid rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        background: #8fffc9;
        box-shadow: 0 0 10px rgba(143, 255, 201, 0.9);
        transition:
          background 160ms ease,
          box-shadow 160ms ease;
      }

      #aquaponics-toggle:hover {
        transform: translateY(-1px);
        box-shadow:
          0 10px 28px rgba(0, 0, 0, 0.36),
          inset 0 1px 0 rgba(255, 255, 255, 0.28);
      }

      #aquaponics-toggle:active {
        transform: translateY(1px) scale(0.98);
      }

      #aquaponics-toggle:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.95);
        outline-offset: 3px;
      }

      #aquaponics-toggle[aria-pressed="false"] {
        background: rgba(35, 42, 49, 0.88);
        opacity: 0.82;
      }

      #aquaponics-toggle[aria-pressed="false"]::before {
        background: transparent;
        box-shadow: none;
      }
    </style>
  </head>

  <body>
    <button
      id="aquaponics-toggle"
      type="button"
      aria-pressed="true"
      aria-label="Hide aquaponics koi"
    >
      Aquaponics
    </button>

    <div id="scanning-overlay" class="hidden">
      <div class="scan-frame">
        <div class="scan-line"></div>
      </div>

      <div class="scan-message">
        Point the camera at the target image
      </div>
    </div>

    <div id="error-message" class="hidden">
      The camera could not be started. Check that camera permission is allowed
      and that this page is running through HTTPS or localhost.
    </div>

    <a-scene
      id="ar-scene"
      mindar-image="
        imageTargetSrc: https://raw.githubusercontent.com/yonhonng/junk_code/main/QR.mind;
        uiScanning: #scanning-overlay;
        autoStart: true;

        filterMinCF: 0.0001;
        filterBeta: 500;

        warmupTolerance: 1;
        missTolerance: 30;
      "
      color-space="sRGB"
      renderer="
        colorManagement: true;
        physicallyCorrectLights: true;
      "
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img
          id="card"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/logo_final.png"
        />

        <a-asset-item
          id="avatarModel"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/model.glb"
        ></a-asset-item>

        <a-asset-item
          id="plants"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/plants.glb"
        ></a-asset-item>

        <a-asset-item
          id="water"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/water.glb"
        ></a-asset-item>

        <a-asset-item
          id="koi"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/koi_fish.glb"
        ></a-asset-item>

        <a-asset-item
          id="seaweed"
          crossorigin="anonymous"
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/seaweed.glb"
        ></a-asset-item>

        <audio
          id="target-found-sound"
          crossorigin="anonymous"
          preload="auto"
          loop
          src="https://raw.githubusercontent.com/yonhonng/junk_code/main/water.mp3"
        ></audio>
      </a-assets>

      <a-camera
        position="0 0 0"
        look-controls="enabled: false"
      ></a-camera>

      <a-entity
        id="image-target"
        mindar-image-target="targetIndex: 0"
      >
        <a-plane
          src="#card"
          position="0 0 -0.2"
          rotation="0 0 0"
          width="0.5"
          height="0.313"
          material="
            shader: flat;
            transparent: true;
            opacity: 1;
            alphaTest: 0.01;
            depthWrite: false;
            side: double;
          "
        ></a-plane>

        <a-gltf-model
          src="#avatarModel"
          position="0 0 0.1"
          rotation="90 0 0"
          scale="1.5 1.5 1.5"
        ></a-gltf-model>

        <a-gltf-model
          src="#plants"
          position="0 0 0.1"
          rotation="90 0 0"
          scale="1.5 1.5 1.5"
        ></a-gltf-model>

        <a-gltf-model
          src="#water"
          position="0 0 0.1"
          rotation="90 0 0"
          scale="1.5 1.5 1.5"
          animation-mixer
        ></a-gltf-model>

        <a-gltf-model
          src="#seaweed"
          position="-0.3 -0.15 -0.25"
          rotation="90 0 0"
          scale="0.15 0.15 0.15"
        ></a-gltf-model>

        <a-gltf-model
          src="#seaweed"
          position="0.15 0.1 -0.25"
          rotation="50 0 0"
          scale="0.12 0.12 0.12"
        ></a-gltf-model>

        <a-gltf-model
          class="koi-model"
          src="#koi"
          position="-0.2 0 -0.1"
          rotation="90 30 0"
          scale="0.05 0.05 0.05"
          animation="
            property: position; 
            to: 0 0.1 -0.15; 
            dur: 10000; 
            easing: easeInOutQuad; 
            loop: true; 
            dir: alternate"
          animation-mixer
        ></a-gltf-model>

        <a-gltf-model
          class="koi-model"
          src="#koi"
          position="0.2 0 -0.1"
          rotation="-90 0 180"
          scale="0.05 0.05 0.05"
          animation="
            property: position; 
            to: 0 -0.15 -0.1; 
            dur: 10000; 
            easing: easeInOutQuad; 
            loop: true; 
            dir: alternate"
          animation-mixer
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const scene = document.querySelector("#ar-scene");
        const target = document.querySelector("#image-target");
        const errorMessage = document.querySelector("#error-message");
        const targetFoundSound = document.querySelector("#target-found-sound");
        const aquaponicsToggle = document.querySelector("#aquaponics-toggle");
        const koiModels = [...document.querySelectorAll(".koi-model")];

        function setKoiVisibility(isEnabled) {
          koiModels.forEach((model) => {
            model.setAttribute("visible", isEnabled);
          });

          aquaponicsToggle.setAttribute("aria-pressed", String(isEnabled));
          aquaponicsToggle.setAttribute(
            "aria-label",
            isEnabled ? "Hide aquaponics koi" : "Show aquaponics koi"
          );
        }

        // The Aquaponics view starts enabled.
        setKoiVisibility(true);

        aquaponicsToggle.addEventListener("click", () => {
          const isCurrentlyEnabled =
            aquaponicsToggle.getAttribute("aria-pressed") === "true";

          setKoiVisibility(!isCurrentlyEnabled);
        });

        /**
         * MindAR creates its camera video element internally.
         * Wait until that video and its MediaStreamTrack are available.
         */
        async function waitForCameraTrack(maxFrames = 120) {
          for (let frame = 0; frame < maxFrames; frame += 1) {
            const videos = [...document.querySelectorAll("video")];

            const video = videos.find((element) => {
              return (
                element.srcObject &&
                typeof element.srcObject.getVideoTracks === "function" &&
                element.srcObject.getVideoTracks().length > 0
              );
            });

            if (video) {
              const track = video.srcObject.getVideoTracks()[0];

              if (track) {
                return { video, track };
              }
            }

            await new Promise((resolve) => {
              requestAnimationFrame(resolve);
            });
          }

          throw new Error("MindAR camera track was not found.");
        }

        function supportsMode(capability, requestedMode) {
          return (
            Array.isArray(capability) &&
            capability.includes(requestedMode)
          );
        }

        async function improveMobileCamera() {
          const { video, track } = await waitForCameraTrack();

          /*
           * These attributes help prevent fullscreen video behaviour on iOS.
           */
          video.setAttribute("playsinline", "");
          video.setAttribute("webkit-playsinline", "");
          video.muted = true;
          video.autoplay = true;

          /*
           * Request a sensible balance between image quality and tracking
           * performance. "ideal" allows the browser to choose the closest
           * supported value instead of failing on devices that cannot provide it.
           */
          const resolutionConstraints = {
            width: {
              ideal: 1280
            },
            height: {
              ideal: 720
            },
            aspectRatio: {
              ideal: 16 / 9
            },
            frameRate: {
              ideal: 30,
              max: 30
            }
          };

          try {
            await track.applyConstraints(resolutionConstraints);
          } catch (error) {
            /*
             * Continue using the browser-selected camera settings if the
             * requested resolution is unsupported.
             */
            console.warn(
              "Could not apply the requested camera resolution:",
              error
            );
          }

          /*
           * Apply optional camera controls only when the current phone and
           * browser report that they support them.
           */
          if (typeof track.getCapabilities === "function") {
            const capabilities = track.getCapabilities();
            const advancedSettings = {};

            if (
              supportsMode(capabilities.focusMode, "continuous")
            ) {
              advancedSettings.focusMode = "continuous";
            }

            if (
              supportsMode(capabilities.exposureMode, "continuous")
            ) {
              advancedSettings.exposureMode = "continuous";
            }

            if (
              supportsMode(
                capabilities.whiteBalanceMode,
                "continuous"
              )
            ) {
              advancedSettings.whiteBalanceMode = "continuous";
            }

            /*
             * Keep browser-controlled zoom at 1× where supported.
             * This avoids unnecessary digital zoom and image degradation.
             */
            if (
              capabilities.zoom &&
              typeof capabilities.zoom.min === "number" &&
              typeof capabilities.zoom.max === "number" &&
              capabilities.zoom.min <= 1 &&
              capabilities.zoom.max >= 1
            ) {
              advancedSettings.zoom = 1;
            }

            if (Object.keys(advancedSettings).length > 0) {
              try {
                await track.applyConstraints({
                  advanced: [advancedSettings]
                });
              } catch (error) {
                console.warn(
                  "Optional camera controls could not be applied:",
                  error
                );
              }
            }
          }

          try {
            await video.play();
          } catch (error) {
            console.warn("Camera video could not be explicitly played:", error);
          }

          if (typeof track.getSettings === "function") {
            const settings = track.getSettings();

            console.log("Active camera settings:", settings);
            console.log(
              `Camera resolution: ${settings.width ?? "unknown"} × ${
                settings.height ?? "unknown"
              }`
            );
            console.log(
              `Camera frame rate: ${settings.frameRate ?? "unknown"}`
            );
            console.log(
              `Camera facing mode: ${settings.facingMode ?? "unknown"}`
            );

            if (
              settings.width &&
              settings.height &&
              (settings.width < 1000 || settings.height < 700)
            ) {
              console.warn(
                "The browser selected a relatively low camera resolution. " +
                  "Image tracking may be less stable."
              );
            }
          }
        }

        scene.addEventListener("arReady", async () => {
          console.log("MindAR is ready.");
          errorMessage.classList.add("hidden");

          try {
            await improveMobileCamera();
          } catch (error) {
            /*
             * MindAR may still work even if the additional camera constraints
             * cannot be applied, so this does not show the full-screen error.
             */
            console.warn(
              "MindAR started, but camera optimisation failed:",
              error
            );
          }
        });

        scene.addEventListener("arError", (event) => {
          console.error("MindAR failed to start:", event);
          errorMessage.classList.remove("hidden");
        });

        target.addEventListener("targetFound", async () => {
          console.log("Target found.");

          /*
           * Start the looping water sound from the beginning whenever the
           * target becomes visible.
           */
          targetFoundSound.pause();
          targetFoundSound.currentTime = 0;

          try {
            await targetFoundSound.play();
          } catch (error) {
            /*
             * Some mobile browsers block audio until the user has interacted
             * with the page. The next targetFound event can play after a tap.
             */
            console.warn("Target sound could not be played:", error);
          }
        });

        target.addEventListener("targetLost", () => {
          console.log("Target lost.");

          // Stop the looping sound as soon as the target is no longer tracked.
          targetFoundSound.pause();
          targetFoundSound.currentTime = 0;
        });
      });
    </script>
  </body>
</html>
